databases:
  - name: atria-postgres
    plan: free
    databaseName: atria_intake
    user: atria

services:
  # Free Redis-compatible instance for BullMQ (email queue). Internal
  # connections are unauthenticated by default and unreachable from the
  # public internet — ipAllowList: [] is required syntax for that (see
  # https://render.com/docs/blueprint-spec#render-key-value), not an
  # oversight; the API only ever talks to this over Render's private
  # network via REDIS_HOST/REDIS_PORT below.
  - type: keyvalue
    name: atria-redis
    plan: free
    ipAllowList: []

  - type: web
    name: atria-api
    runtime: node
    plan: free
    region: oregon
    # No rootDir: this is an npm-workspaces monorepo (apps/api depends on
    # the workspace-local packages/shared package via "@atria/shared": "*",
    # which only resolves when npm install runs from the repo root). Every
    # command below is workspace-scoped instead of relying on a scoped
    # build context.
    # preDeployCommand isn't available on the free plan, so the migration
    # runs as the last build step instead. Free tier only ever runs a
    # single instance, so there's no rolling-deploy race to avoid by
    # separating it out — running it here is equivalent, and
    # `migrate deploy` is safe to re-run on every build regardless.
    # --include=dev: Render skips devDependencies during install whenever
    # NODE_ENV=production is set (standard platform behavior, not an npm
    # default). @nestjs/cli — which provides the `nest` binary `nest
    # build` needs — lives in devDependencies, so the plain install left
    # it missing (`nest: not found`). This forces it in at build time
    # while NODE_ENV=production still applies at runtime.
    buildCommand: npm install --include=dev && npm run prisma:generate --workspace=apps/api && npm run build --workspace=apps/api && npm run prisma:deploy --workspace=apps/api
    # nest build's inferred TS rootDir includes test/ alongside src/, so
    # the compiled entrypoint lands at dist/src/main.js, not dist/main.js —
    # verified against the actual build output, not assumed.
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render's default expected port is 10000 (see Port binding in
      # Render's docs) — this app reads API_PORT, not Render's own PORT
      # var, so it's set explicitly rather than relying on port-scanning.
      - key: API_PORT
        value: "10000"

      - key: DATABASE_URL
        fromDatabase:
          name: atria-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: atria-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: atria-redis
          property: port

      # ── Auth: Clerk — real keys, prompted for during Blueprint creation
      # (never stored in this file). Reuse the same values already in
      # apps/api/.env locally; Render will ask for them once, in its own
      # dashboard, not through me.
      - key: AUTH_PROVIDER
        value: clerk
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

      # ── Storage: S3 — intentionally deferred (step 5). STORAGE_BUCKET
      # needs *some* value because env.validation.ts requires it to boot
      # at all; the placeholder lets the app start with every non-document
      # feature working, and document upload/download simply fails until
      # real credentials replace these. Swap all four for real values once
      # the bucket + IAM user exist — no code change needed either way.
      - key: STORAGE_PROVIDER
        value: s3
      - key: STORAGE_REGION
        value: us-east-1
      - key: STORAGE_BUCKET
        value: atria-intake-demo-placeholder
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_FORCE_PATH_STYLE
        value: "false"
      - key: STORAGE_SIGNED_URL_TTL_SECONDS
        value: "900"

      # ── Email — generic SMTP via the client's cPanel-hosted mailbox.
      - key: EMAIL_PROVIDER
        value: smtp
      - key: MAILHIPPO_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: test@atriawell.com
      - key: SMTP_HOST
        value: atriawell.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: test@atriawell.com
      - key: SMTP_PASSWORD
        sync: false

      # ── AI summaries — optional, defaults to the free db_generated
      # provider (no external calls, no key needed).
      - key: AI_PROVIDER
        value: db_generated
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── App URLs — real deployed URLs. CORS (see main.ts, enableCors
      # origin: config.get("webUrl")) reads WEB_URL directly, so this is
      # also what makes the deployed frontend's origin allowed.
      - key: API_URL
        value: https://atria-api-n9qj.onrender.com
      - key: WEB_URL
        value: https://web-eight-orpin-42.vercel.app
      - key: INTAKE_LINK_BASE_URL
        value: https://web-eight-orpin-42.vercel.app/intake
