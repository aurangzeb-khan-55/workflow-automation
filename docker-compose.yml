name: atria-intake-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: atria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atria
      POSTGRES_PASSWORD: atria_dev_password
      POSTGRES_DB: atria_intake
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atria -d atria_intake"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atria-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local S3-compatible storage emulator. In production this is Amazon S3;
  # swapping is a config change only (see apps/api/src/modules/documents/storage).
  localstack:
    image: localstack/localstack:3
    container_name: atria-localstack
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./docker/localstack-init:/etc/localstack/init/ready.d

volumes:
  postgres_data:
  redis_data:
  localstack_data:
